<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shuo monitor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #30363d;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --user:      #38bdf8;
    --agent:     #4ade80;
    --warn:      #f59e0b;
    --danger:    #ef4444;
    --ok:        #22c55e;
    --blue:      #3b82f6;
    --purple:    #a855f7;
  }

  body {
    font-family: 'Courier New', Courier, monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 1rem; font-weight: bold; letter-spacing: 0.05em; }
  header h1 span { color: var(--muted); font-weight: normal; }

  #ws-status {
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 99px;
    background: #1c2128;
    border: 1px solid var(--border);
  }
  #ws-status.connected    { color: var(--ok);     border-color: var(--ok); }
  #ws-status.disconnected { color: var(--danger);  border-color: var(--danger); }
  #ws-status.connecting   { color: var(--warn);    border-color: var(--warn); }

  #phone-status {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 99px;
    background: #1c2128;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  #phone-status.ready { color: var(--ok); border-color: var(--ok); }

  #active-count {
    margin-left: auto;
    font-size: 0.8rem;
    color: var(--muted);
  }

  /* ── Main content ────────────────────────────────── */
  main { flex: 1; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

  /* ── New Call form ───────────────────────────────── */
  #new-call-panel {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    overflow: hidden;
  }

  #new-call-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: #1c2128;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
  }
  #new-call-header:hover { background: #21262d; }
  #new-call-toggle { margin-left: auto; color: var(--muted); font-size: 0.8rem; }

  #new-call-body {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #new-call-body.hidden { display: none; }

  .form-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .form-row label {
    font-size: 0.78rem;
    color: var(--muted);
    width: 52px;
    flex-shrink: 0;
  }

  .form-row input,
  .form-row textarea {
    flex: 1;
    font-family: inherit;
    font-size: 0.82rem;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #0d1117;
    color: var(--text);
    outline: none;
    resize: none;
  }
  .form-row input:focus,
  .form-row textarea:focus { border-color: var(--blue); }

  #call-form-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn-call {
    border-color: #1d4ed8;
    color: var(--blue);
    font-weight: bold;
  }
  .btn-call:hover { background: #0f1e38; }
  .btn-call:disabled { opacity: 0.4; cursor: not-allowed; }

  #call-form-msg {
    font-size: 0.78rem;
    color: var(--muted);
  }
  #call-form-msg.error { color: var(--danger); }
  #call-form-msg.ok    { color: var(--ok); }

  #no-calls {
    color: var(--muted);
    text-align: center;
    margin-top: 80px;
    font-size: 0.9rem;
  }

  /* ── Call panel ──────────────────────────────────── */
  .call-panel {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    overflow: hidden;
  }

  .call-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: #1c2128;
    font-size: 0.85rem;
  }

  .call-phone { font-weight: bold; color: var(--text); }
  .call-id    { color: var(--muted); font-size: 0.75rem; }
  .call-timer { margin-left: auto; color: var(--muted); font-size: 0.78rem; }

  .phase-badge {
    font-size: 0.7rem;
    font-weight: bold;
    padding: 2px 8px;
    border-radius: 99px;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .phase-badge.LISTENING  { background: #1f2937; color: var(--muted); border: 1px solid #374151; }
  .phase-badge.RESPONDING { background: #1e1010; color: var(--danger); border: 1px solid #7f1d1d; }
  .phase-badge.TAKEOVER   { background: #1c1710; color: var(--warn);   border: 1px solid #78350f; }

  .call-goal {
    padding: 6px 16px;
    font-size: 0.78rem;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: #161b22;
  }
  .call-goal strong { color: var(--text); }

  /* ── Chat view (conversational transcript) ──────── */
  .chat-view {
    overflow-y: auto;
    padding: 10px 12px;
    max-height: 320px;
    min-height: 160px;
    border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
    line-height: 1.5;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .msg-label {
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    font-weight: bold;
    padding: 0 4px;
  }

  .msg-text {
    padding: 6px 10px;
    border-radius: 8px;
    max-width: 82%;
    word-break: break-word;
    white-space: pre-wrap;
  }

  /* Callee — left-aligned, blue */
  .msg-callee .msg-label { color: var(--user); }
  .msg-callee .msg-text  { background: #0f2035; border: 1px solid #1e4060; color: var(--user); align-self: flex-start; }

  /* Agent — right-aligned, green */
  .msg-agent { align-items: flex-end; }
  .msg-agent .msg-label { color: var(--agent); }
  .msg-agent .msg-text  { background: #0f2018; border: 1px solid #1a4028; color: var(--agent); }
  .msg-agent.streaming .msg-text::after {
    content: '\25CC';
    animation: blink 0.8s step-end infinite;
    color: var(--agent);
    opacity: 0.8;
    margin-left: 4px;
  }

  /* Human — right-aligned, amber */
  .msg-human { align-items: flex-end; }
  .msg-human .msg-label { color: var(--warn); }
  .msg-human .msg-text  { background: #1c1209; border: 1px solid #78350f; color: var(--warn); }

  @keyframes blink { 50% { opacity: 0; } }

  .event-chip {
    display: inline-block;
    font-size: 0.7rem;
    padding: 1px 6px;
    border-radius: 4px;
    margin: 2px 2px 2px 0;
    background: #21262d;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .event-chip.dtmf   { color: var(--purple); border-color: var(--purple); }
  .event-chip.hold   { color: var(--warn);   border-color: var(--warn); }

  /* ── Events log (DTMF, hold chips) ─────────────── */
  .call-events {
    min-height: 28px;
    padding: 4px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px;
    background: #0d1117;
  }

  /* ── Takeover softphone bar ────────────────────── */
  .takeover-bar {
    display: none;
    padding: 10px 16px;
    background: #1c1710;
    border-bottom: 1px solid #78350f;
    font-size: 0.8rem;
    color: var(--warn);
    align-items: center;
    gap: 12px;
  }
  .takeover-bar.visible { display: flex; }
  .takeover-bar .bar-status { flex: 1; }
  .takeover-bar .btn-mute {
    border-color: var(--border);
    color: var(--muted);
    font-size: 0.75rem;
    padding: 3px 10px;
  }
  .takeover-bar .btn-mute.muted { color: var(--danger); border-color: var(--danger); }
  .takeover-bar .btn-transfer-back {
    border-color: #14532d;
    color: var(--ok);
    font-size: 0.75rem;
    padding: 3px 10px;
    font-weight: bold;
  }
  .takeover-bar .btn-transfer-back:hover { background: #0f1e14; }

  /* ── Controls ───────────────────────────────────── */
  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    flex-wrap: wrap;
  }

  button {
    font-family: inherit;
    font-size: 0.78rem;
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #21262d;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover { background: #2d333b; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-hangup   { border-color: #7f1d1d; color: var(--danger); }
  .btn-hangup:hover { background: #2d0f0f; }

  .btn-takeover { border-color: #78350f; color: var(--warn); }
  .btn-takeover:hover { background: #1c1710; }

  .btn-keypad-toggle { color: var(--muted); }

  /* ── DTMF Keypad ────────────────────────────────── */
  .keypad {
    display: none;
    padding: 10px 14px 14px;
    border-top: 1px solid var(--border);
  }
  .keypad.open { display: block; }

  .keypad-grid {
    display: grid;
    grid-template-columns: repeat(3, 44px);
    gap: 6px;
  }

  .keypad-grid button {
    width: 44px;
    height: 40px;
    padding: 0;
    font-size: 1rem;
    font-weight: bold;
    text-align: center;
    border-color: #4c1d95;
    color: var(--purple);
  }
  .keypad-grid button:hover { background: #1c1028; }

  /* ── Outcome panel ──────────────────────────────── */
  .outcome-panel {
    display: none;
    padding: 10px 16px 14px;
    border-top: 1px solid var(--border);
    background: #0d1117;
  }
  .outcome-panel.visible { display: block; }

  .outcome-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .outcome-text {
    font-size: 0.82rem;
    line-height: 1.55;
    color: var(--text);
    min-height: 2.5em;
    white-space: pre-wrap;
  }

  .outcome-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    align-items: center;
  }

  .btn-summarize { border-color: #4c1d95; color: var(--purple); }
  .btn-summarize:hover { background: #1c1028; }

  .outcome-status { font-size: 0.75rem; color: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>shuo <span>monitor</span></h1>
  <div id="ws-status" class="connecting">connecting...</div>
  <div id="phone-status">phone: init</div>
  <div id="active-count">active: 0</div>
</header>

<main>
  <!-- ── New Call form ─────────────────────────────────────────── -->
  <div id="new-call-panel">
    <div id="new-call-header" onclick="toggleNewCallForm()">
      <span>+ New Call</span>
      <span id="new-call-toggle">&triangle; collapse</span>
    </div>
    <div id="new-call-body">
      <div class="form-row">
        <label for="nc-phone">Phone</label>
        <input id="nc-phone" type="tel" placeholder="+61400000000" autocomplete="off">
      </div>
      <div class="form-row" style="align-items:flex-start">
        <label for="nc-goal" style="padding-top:6px">Goal</label>
        <textarea id="nc-goal" rows="2"
          placeholder="e.g. Confirm the customer's appointment for tomorrow at 2pm"></textarea>
      </div>
      <div class="form-row">
        <label></label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;width:auto">
          <input type="checkbox" id="nc-ivr-mode" style="width:auto;flex:none">
          <span style="font-size:0.82rem;color:var(--muted)">IVR mode <span style="font-size:0.75rem">(suppress greeting, DTMF navigation)</span></span>
        </label>
      </div>
      <div id="call-form-actions">
        <button class="btn-call" id="btn-place-call" onclick="placeCall()">Place Call</button>
        <span id="call-form-msg"></span>
      </div>
    </div>
  </div>

  <div id="no-calls">No active calls. Waiting...</div>
  <div id="calls"></div>
</main>

<script src="https://unpkg.com/@twilio/voice-sdk@2.18.0/dist/twilio.min.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
const calls = {};       // call_id -> callState
let   ws    = null;
let   reconnectDelay = 1000;

// ── Twilio Voice Device (softphone) ─────────────────────────────────────
let twilioDevice = null;
let softphoneCall = null;          // active Twilio call during takeover
let pendingTakeoverCallId = null;  // set before server dials us

async function initTwilioDevice() {
  const statusEl = document.getElementById('phone-status');
  try {
    statusEl.textContent = 'phone: connecting';
    const res = await fetch('/token');
    const data = await res.json();
    twilioDevice = new Twilio.Device(data.token, { codecPreferences: ['opus', 'pcmu'] });

    twilioDevice.on('registered', () => {
      statusEl.textContent = 'phone: ready';
      statusEl.className = 'ready';
    });
    twilioDevice.on('error', (e) => {
      statusEl.textContent = 'phone: error';
      statusEl.className = '';
      console.error('Twilio device error', e);
    });
    twilioDevice.on('incoming', (call) => {
      // Auto-accept incoming takeover calls from the server
      if (pendingTakeoverCallId) {
        call.accept();
        softphoneCall = call;
        const callId = pendingTakeoverCallId;
        pendingTakeoverCallId = null;
        call.on('disconnect', () => onSoftphoneDisconnect(callId));
        call.on('cancel', () => onSoftphoneDisconnect(callId));
      }
    });

    twilioDevice.register();
  } catch (e) {
    statusEl.textContent = 'phone: failed';
    console.error('Failed to init Twilio device', e);
  }
}

function onSoftphoneDisconnect(callId) {
  softphoneCall = null;
  const state = calls[callId];
  if (state && state.mode === 'takeover' && !state._ending) {
    // Softphone disconnected by user — hand back to agent
    doHandback(callId);
  }
}

function onCallEnded(callId) {
  // Server says call is fully over — disconnect softphone if still active
  const state = calls[callId];
  if (state) state._ending = true;  // prevent onSoftphoneDisconnect from calling handback
  if (softphoneCall) {
    try { softphoneCall.disconnect(); } catch(e) {}
    softphoneCall = null;
  }
  pendingTakeoverCallId = null;
  if (state) {
    state.mode = 'agent';
    setMode(callId, 'agent');
    scheduleRemove(callId);
  }
}

// ── WebSocket ──────────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const url   = `${proto}://${location.host}/dashboard/ws`;

  setWsStatus('connecting', 'connecting...');
  ws = new WebSocket(url);

  ws.onopen = () => {
    setWsStatus('connected', 'connected');
    reconnectDelay = 1000;
  };

  ws.onmessage = e => {
    try { handleEvent(JSON.parse(e.data)); }
    catch (err) { console.error('parse error', err); }
  };

  ws.onclose = ws.onerror = () => {
    setWsStatus('disconnected', `reconnecting in ${reconnectDelay / 1000}s...`);
    setTimeout(() => {
      reconnectDelay = Math.min(reconnectDelay * 2, 16000);
      connectWS();
    }, reconnectDelay);
  };
}

function setWsStatus(cls, text) {
  const el = document.getElementById('ws-status');
  el.className = cls;
  el.textContent = text;
}

// ── Event dispatcher ───────────────────────────────────────────────────────
function handleEvent(ev) {
  switch (ev.type) {
    case 'active_calls': ev.calls.forEach(c => getOrCreatePanel(c)); break;
    case 'stream_start': {
      const existing = calls[ev.call_id];
      if (existing) {
        // Reconnection after take-over hand-back — re-enable panel
        existing.panel.querySelector('.outcome-panel').classList.remove('visible');
        existing.panel.querySelector('.call-header').style.opacity = '';
        existing.panel.querySelectorAll('.controls button').forEach(b => b.disabled = false);
        setMode(ev.call_id, 'agent');
        if (!existing.timerInterval) {
          existing.timerInterval = setInterval(() => {
            existing.elapsed++;
            const el = existing.panel.querySelector('.call-timer');
            if (el) el.textContent = formatTime(existing.elapsed);
          }, 1000);
        }
      } else {
        getOrCreatePanel({
          call_id: ev.call_id, phone: ev.phone || ev.call_id,
          goal: ev.goal || '', mode: 'agent'
        });
      }
      break;
    }
    case 'stream_stop': {
      const cs = calls[ev.call_id];
      if (cs && cs.mode === 'takeover') {
        // Stream closed for takeover redirect — panel stays active
      } else {
        scheduleRemove(ev.call_id);
      }
      break;
    }
    case 'transcript':   addTurn(ev.call_id, ev.speaker || 'callee', ev.text); break;
    case 'phase_change': setPhase(ev.call_id, ev.to); break;
    case 'agent_token':  appendAgentToken(ev.call_id, ev.token); break;
    case 'agent_done':   finalizeAgentTurn(ev.call_id); break;
    case 'dtmf':         addEventChip(ev.call_id, 'DTMF ' + ev.digit, 'dtmf'); break;
    case 'hold':         addEventChip(ev.call_id, 'hold', 'hold'); break;
    case 'hold_end':     addEventChip(ev.call_id, 'hold end', 'hold'); break;
    case 'takeover':     setMode(ev.call_id, 'takeover'); break;
    case 'handback':     setMode(ev.call_id, 'agent'); break;
    case 'call_ended':   onCallEnded(ev.call_id); break;
  }
}

// ── Panel lifecycle ────────────────────────────────────────────────────────
function getOrCreatePanel(callData) {
  if (calls[callData.call_id]) return calls[callData.call_id];

  const state = {
    call_id:        callData.call_id,
    phone:          callData.phone  || callData.call_id,
    goal:           callData.goal   || '',
    mode:           callData.mode   || 'agent',
    phase:          'LISTENING',
    elapsed:        callData.elapsed || 0,
    timerInterval:  null,
    agentBlock:     null,
    agentBuf:       '',
    transcript:     [],
    muted:          false,
  };
  calls[callData.call_id] = state;

  const panel = buildPanel(state);
  state.panel = panel;
  document.getElementById('calls').appendChild(panel);
  document.getElementById('no-calls').style.display = 'none';
  updateActiveCount();

  state.timerInterval = setInterval(() => {
    state.elapsed++;
    const el = panel.querySelector('.call-timer');
    if (el) el.textContent = formatTime(state.elapsed);
  }, 1000);

  return state;
}

function scheduleRemove(callId) {
  const state = calls[callId];
  if (!state) return;
  clearInterval(state.timerInterval);
  state.timerInterval = null;
  const panel = state.panel;
  panel.querySelector('.outcome-panel').classList.add('visible');
  panel.querySelector('.call-header').style.opacity = '0.5';
  panel.querySelectorAll('.controls button').forEach(b => b.disabled = true);
}

function removePanel(callId) {
  const state = calls[callId];
  if (!state) return;
  clearInterval(state.timerInterval);
  if (state.panel) state.panel.remove();
  delete calls[callId];
  if (Object.keys(calls).length === 0)
    document.getElementById('no-calls').style.display = '';
  updateActiveCount();
}

function updateActiveCount() {
  document.getElementById('active-count').textContent =
    `active: ${Object.keys(calls).length}`;
}

// ── Build DOM ──────────────────────────────────────────────────────────────
function buildPanel(state) {
  const el = document.createElement('div');
  el.className = 'call-panel';
  el.dataset.callId = state.call_id;

  el.innerHTML = `
    <div class="call-header">
      <span class="call-phone">${esc(state.phone || state.call_id)}</span>
      <span class="call-id">${esc(state.call_id)}</span>
      <span class="phase-badge LISTENING">LISTENING</span>
      <span class="call-timer">${formatTime(state.elapsed)}</span>
    </div>
    <div class="call-goal">
      <strong>Goal:</strong> <span class="goal-text">${esc(state.goal) || '<span style="color:var(--muted)">&mdash;</span>'}</span>
    </div>
    <div class="chat-view"></div>
    <div class="call-events"></div>
    <div class="takeover-bar">
      <span class="bar-status">You are on the call &mdash; agent listening</span>
      <button class="btn-mute" onclick="doToggleMute('${state.call_id}')">Mute</button>
      <button class="btn-transfer-back" onclick="doTransferBack('${state.call_id}')">Transfer Back</button>
    </div>
    <div class="controls">
      <button class="btn-hangup"   onclick="doHangup('${state.call_id}')">Hang Up</button>
      <button class="btn-takeover" onclick="doTakeover('${state.call_id}')">Take Over</button>
      <button class="btn-keypad-toggle" onclick="toggleKeypad('${state.call_id}')">Keypad</button>
    </div>
    <div class="keypad">
      <div class="keypad-grid">
        ${['1','2','3','4','5','6','7','8','9','*','0','#'].map(d =>
          `<button onclick="doSendDTMF('${state.call_id}','${d}')">${d}</button>`
        ).join('')}
      </div>
    </div>
    <div class="outcome-panel">
      <div class="outcome-label">OUTCOME</div>
      <div class="outcome-text">&mdash;</div>
      <div class="outcome-actions">
        <button class="btn-summarize" onclick="doSummarize('${state.call_id}')">Summarize</button>
        <span class="outcome-status"></span>
      </div>
    </div>
  `;
  return el;
}

// ── Transcript ────────────────────────────────────────────────────────────
function addTurn(callId, speaker, text) {
  const state = calls[callId];
  if (!state) return;
  state.transcript.push({ role: speaker, text });
  const chat = state.panel.querySelector('.chat-view');
  const msg = document.createElement('div');
  msg.className = `msg msg-${speaker}`;
  msg.innerHTML = `<span class="msg-label">${speaker.toUpperCase()}</span><span class="msg-text">${esc(text)}</span>`;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function appendAgentToken(callId, token) {
  const state = calls[callId];
  if (!state) return;
  state.agentBuf += token;
  const chat = state.panel.querySelector('.chat-view');

  if (!state.agentBlock) {
    state.agentBlock = document.createElement('div');
    state.agentBlock.className = 'msg msg-agent streaming';
    state.agentBlock.innerHTML = `<span class="msg-label">AGENT</span><span class="msg-text"></span>`;
    chat.appendChild(state.agentBlock);
  }
  state.agentBlock.querySelector('.msg-text').appendChild(document.createTextNode(token));
  chat.scrollTop = chat.scrollHeight;
}

function finalizeAgentTurn(callId) {
  const state = calls[callId];
  if (!state || !state.agentBlock) return;
  state.agentBlock.classList.remove('streaming');
  state.agentBlock = null;
  if (state.agentBuf) {
    state.transcript.push({ role: 'agent', text: state.agentBuf });
    state.agentBuf = '';
  }
}

// ── Phase / mode ──────────────────────────────────────────────────────────
function setPhase(callId, phase) {
  const state = calls[callId];
  if (!state) return;
  state.phase = phase;

  if (phase === 'RESPONDING') state.agentBlock = null;

  const badge = state.panel.querySelector('.phase-badge');
  if (!badge) return;

  const displayPhase = state.mode === 'takeover' ? 'TAKEOVER' : phase;
  badge.className = `phase-badge ${displayPhase}`;
  badge.textContent = displayPhase;
}

function setMode(callId, mode) {
  const state = calls[callId];
  if (!state) return;
  state.mode = mode;

  const bar      = state.panel.querySelector('.takeover-bar');
  const btnTake  = state.panel.querySelector('.btn-takeover');

  if (mode === 'takeover') {
    bar.classList.add('visible');
    btnTake.style.display = 'none';
  } else {
    bar.classList.remove('visible');
    btnTake.style.display = '';
    // Reset mute state
    state.muted = false;
    const muteBtn = state.panel.querySelector('.btn-mute');
    if (muteBtn) { muteBtn.textContent = 'Mute'; muteBtn.classList.remove('muted'); }
  }

  setPhase(callId, state.phase);
}

// ── Event chips ───────────────────────────────────────────────────────────
function addEventChip(callId, label, cls) {
  const state = calls[callId];
  if (!state) return;
  const container = state.panel.querySelector('.call-events');
  const chip = document.createElement('span');
  chip.className = `event-chip ${cls}`;
  chip.textContent = label;
  container.appendChild(chip);
}

// ── Control actions ───────────────────────────────────────────────────────
async function doHangup(callId) {
  if (!confirm('Hang up this call?')) return;
  // Disconnect softphone if active (prevents browser mic staying open)
  if (softphoneCall) {
    try { softphoneCall.disconnect(); } catch(e) {}
    softphoneCall = null;
  }
  try {
    const r = await api(`/dashboard/calls/${callId}/hangup`, 'POST');
    if (!r.ok) showError(callId, await r.text());
  } catch (e) { showError(callId, e.message); }
}

async function doTakeover(callId) {
  if (!twilioDevice || twilioDevice.state !== 'registered') {
    showError(callId, 'Softphone not ready');
    return;
  }
  // Tell the device to expect an incoming call for this takeover
  pendingTakeoverCallId = callId;
  try {
    const r = await api(`/dashboard/calls/${callId}/takeover`, 'POST');
    if (!r.ok) {
      pendingTakeoverCallId = null;
      showError(callId, await r.text());
    }
  } catch (e) {
    pendingTakeoverCallId = null;
    showError(callId, e.message);
  }
}

async function doHandback(callId) {
  // Disconnect our softphone leg
  if (softphoneCall) {
    try { softphoneCall.disconnect(); } catch(e) {}
    softphoneCall = null;
  }
  try {
    const r = await api(`/dashboard/calls/${callId}/handback`, 'POST');
    if (!r.ok) showError(callId, await r.text());
  } catch (e) { showError(callId, e.message); }
}

function doTransferBack(callId) {
  doHandback(callId);
}

function doToggleMute(callId) {
  const state = calls[callId];
  if (!state || !softphoneCall) return;
  state.muted = !state.muted;
  softphoneCall.mute(state.muted);
  const btn = state.panel.querySelector('.btn-mute');
  if (state.muted) {
    btn.textContent = 'Unmute';
    btn.classList.add('muted');
  } else {
    btn.textContent = 'Mute';
    btn.classList.remove('muted');
  }
}

async function doSendDTMF(callId, digit) {
  try {
    const r = await api(`/dashboard/calls/${callId}/dtmf`, 'POST', { digit });
    if (!r.ok) showError(callId, await r.text());
  } catch (e) { showError(callId, e.message); }
}

function toggleKeypad(callId) {
  const state = calls[callId];
  if (!state) return;
  const keypad = state.panel.querySelector('.keypad');
  keypad.classList.toggle('open');
}

// ── Helpers ────────────────────────────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  return fetch(path, opts);
}

function showError(callId, msg) {
  const state = calls[callId];
  if (!state) return;
  addEventChip(callId, msg, '');
}

function formatTime(secs) {
  const m = String(Math.floor(secs / 60)).padStart(2, '0');
  const s = String(secs % 60).padStart(2, '0');
  return `${m}:${s}`;
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Outcome / Summary ──────────────────────────────────────────────────────
async function doSummarize(callId) {
  const state = calls[callId];
  if (!state) return;
  const panel   = state.panel;
  const textEl  = panel.querySelector('.outcome-text');
  const statusEl = panel.querySelector('.outcome-status');
  const btn     = panel.querySelector('.btn-summarize');

  btn.disabled = true;
  statusEl.textContent = 'Generating...';

  try {
    const r = await api('/dashboard/summarize', 'POST', {
      goal:       state.goal,
      transcript: state.transcript,
    });
    const data = await r.json();
    if (!r.ok) {
      statusEl.textContent = `Error: ${data.error || r.statusText}`;
      btn.disabled = false;
    } else {
      textEl.textContent = data.summary;
      statusEl.textContent = '';
    }
  } catch (e) {
    statusEl.textContent = `Error: ${e.message}`;
    btn.disabled = false;
  }
}

// ── New Call form ───────────────────────────────────────────────────────────
function toggleNewCallForm() {
  const body   = document.getElementById('new-call-body');
  const toggle = document.getElementById('new-call-toggle');
  const collapsed = body.classList.toggle('hidden');
  toggle.textContent = collapsed ? 'expand' : 'collapse';
}

async function placeCall() {
  const phone   = document.getElementById('nc-phone').value.trim();
  const goal    = document.getElementById('nc-goal').value.trim();
  const ivrMode = document.getElementById('nc-ivr-mode').checked;
  const btn     = document.getElementById('btn-place-call');
  const msg     = document.getElementById('call-form-msg');

  if (!phone) {
    setFormMsg('Phone number is required', 'error');
    return;
  }

  btn.disabled = true;
  setFormMsg('Placing call...', '');

  try {
    const r = await api('/dashboard/call', 'POST', { phone, goal, ivr_mode: ivrMode });
    const data = await r.json();
    if (!r.ok) {
      setFormMsg(`Error: ${data.error || r.statusText}`, 'error');
    } else {
      setFormMsg(`Calling ${data.to}...`, 'ok');
    }
  } catch (e) {
    setFormMsg(`Error: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
  }
}

function setFormMsg(text, cls) {
  const el = document.getElementById('call-form-msg');
  el.textContent = text;
  el.className   = cls;
}

document.getElementById('nc-phone').addEventListener('keydown', e => {
  if (e.key === 'Enter') placeCall();
});

// ── Boot ────────────────────────────────────────────────────────────────────
connectWS();
initTwilioDevice();
</script>
