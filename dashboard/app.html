<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shuo monitor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #30363d;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --user:      #38bdf8;
    --agent:     #4ade80;
    --warn:      #f59e0b;
    --danger:    #ef4444;
    --ok:        #22c55e;
    --blue:      #3b82f6;
    --purple:    #a855f7;
  }

  body {
    font-family: 'Courier New', Courier, monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 1rem; font-weight: bold; letter-spacing: 0.05em; }
  header h1 span { color: var(--muted); font-weight: normal; }

  #ws-status {
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 99px;
    background: #1c2128;
    border: 1px solid var(--border);
  }
  #ws-status.connected    { color: var(--ok);     border-color: var(--ok); }
  #ws-status.disconnected { color: var(--danger);  border-color: var(--danger); }
  #ws-status.connecting   { color: var(--warn);    border-color: var(--warn); }

  #active-count {
    margin-left: auto;
    font-size: 0.8rem;
    color: var(--muted);
  }

  /* ── Main content ────────────────────────────────── */
  main { flex: 1; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

  /* ── New Call form ───────────────────────────────── */
  #new-call-panel {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    overflow: hidden;
  }

  #new-call-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: #1c2128;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
  }
  #new-call-header:hover { background: #21262d; }
  #new-call-toggle { margin-left: auto; color: var(--muted); font-size: 0.8rem; }

  #new-call-body {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #new-call-body.hidden { display: none; }

  .form-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .form-row label {
    font-size: 0.78rem;
    color: var(--muted);
    width: 52px;
    flex-shrink: 0;
  }

  .form-row input,
  .form-row textarea {
    flex: 1;
    font-family: inherit;
    font-size: 0.82rem;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #0d1117;
    color: var(--text);
    outline: none;
    resize: none;
  }
  .form-row input:focus,
  .form-row textarea:focus { border-color: var(--blue); }

  #call-form-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn-call {
    border-color: #1d4ed8;
    color: var(--blue);
    font-weight: bold;
  }
  .btn-call:hover { background: #0f1e38; }
  .btn-call:disabled { opacity: 0.4; cursor: not-allowed; }

  #call-form-msg {
    font-size: 0.78rem;
    color: var(--muted);
  }
  #call-form-msg.error { color: var(--danger); }
  #call-form-msg.ok    { color: var(--ok); }

  #no-calls {
    color: var(--muted);
    text-align: center;
    margin-top: 80px;
    font-size: 0.9rem;
  }

  /* ── Call panel ──────────────────────────────────── */
  .call-panel {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    overflow: hidden;
  }

  .call-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: #1c2128;
    font-size: 0.85rem;
  }

  .call-phone { font-weight: bold; color: var(--text); }
  .call-id    { color: var(--muted); font-size: 0.75rem; }
  .call-timer { margin-left: auto; color: var(--muted); font-size: 0.78rem; }

  .phase-badge {
    font-size: 0.7rem;
    font-weight: bold;
    padding: 2px 8px;
    border-radius: 99px;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .phase-badge.LISTENING  { background: #1f2937; color: var(--muted); border: 1px solid #374151; }
  .phase-badge.RESPONDING { background: #1e1010; color: var(--danger); border: 1px solid #7f1d1d; }
  .phase-badge.TAKEOVER   { background: #1c1710; color: var(--warn);   border: 1px solid #78350f; }

  .call-goal {
    padding: 6px 16px;
    font-size: 0.78rem;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: #161b22;
  }
  .call-goal strong { color: var(--text); }

  /* ── Transcript area ────────────────────────────── */
  .transcript-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid var(--border);
    min-height: 160px;
    max-height: 300px;
  }

  .col {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .col + .col { border-left: 1px solid var(--border); }

  .col-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    padding: 5px 12px 4px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: #1c2128;
  }
  .user-col  .col-label { color: var(--user); }
  .agent-col .col-label { color: var(--agent); }

  .col-content {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    font-size: 0.82rem;
    line-height: 1.55;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .turn-block {
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid #21262d;
  }
  .turn-block:last-child { border-bottom: none; margin-bottom: 0; }

  .user-col  .turn-block { color: var(--user); }
  .agent-col .turn-block { color: var(--agent); }

  .turn-block.streaming::after {
    content: '▌';
    animation: blink 0.8s step-end infinite;
    color: var(--agent);
    opacity: 0.8;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .event-chip {
    display: inline-block;
    font-size: 0.7rem;
    padding: 1px 6px;
    border-radius: 4px;
    margin: 2px 2px 2px 0;
    background: #21262d;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .event-chip.dtmf   { color: var(--purple); border-color: var(--purple); }
  .event-chip.hold   { color: var(--warn);   border-color: var(--warn); }

  /* ── Events log (DTMF, hold chips) ─────────────── */
  .call-events {
    min-height: 28px;
    padding: 4px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px;
    background: #0d1117;
  }

  /* ── Takeover banner ────────────────────────────── */
  .takeover-banner {
    display: none;
    padding: 8px 16px;
    background: #1c1710;
    border-bottom: 1px solid #78350f;
    font-size: 0.8rem;
    color: var(--warn);
    align-items: center;
    gap: 12px;
  }
  .takeover-banner.visible { display: flex; }
  .takeover-banner a {
    color: var(--blue);
    text-decoration: none;
    font-size: 0.78rem;
  }
  .takeover-banner a:hover { text-decoration: underline; }

  /* ── Controls ───────────────────────────────────── */
  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    flex-wrap: wrap;
  }

  button {
    font-family: inherit;
    font-size: 0.78rem;
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #21262d;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover { background: #2d333b; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-hangup   { border-color: #7f1d1d; color: var(--danger); }
  .btn-hangup:hover { background: #2d0f0f; }

  .btn-takeover { border-color: #78350f; color: var(--warn); }
  .btn-takeover:hover { background: #1c1710; }

  .btn-handback { border-color: #14532d; color: var(--ok); }
  .btn-handback:hover { background: #0f1e14; }

  .btn-keypad-toggle { color: var(--muted); }

  /* ── DTMF Keypad ────────────────────────────────── */
  .keypad {
    display: none;
    padding: 10px 14px 14px;
    border-top: 1px solid var(--border);
  }
  .keypad.open { display: block; }

  .keypad-grid {
    display: grid;
    grid-template-columns: repeat(3, 44px);
    gap: 6px;
  }

  .keypad-grid button {
    width: 44px;
    height: 40px;
    padding: 0;
    font-size: 1rem;
    font-weight: bold;
    text-align: center;
    border-color: #4c1d95;
    color: var(--purple);
  }
  .keypad-grid button:hover { background: #1c1028; }

  /* ── Outcome panel ──────────────────────────────── */
  .outcome-panel {
    display: none;
    padding: 10px 16px 14px;
    border-top: 1px solid var(--border);
    background: #0d1117;
  }
  .outcome-panel.visible { display: block; }

  .outcome-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .outcome-text {
    font-size: 0.82rem;
    line-height: 1.55;
    color: var(--text);
    min-height: 2.5em;
    white-space: pre-wrap;
  }

  .outcome-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    align-items: center;
  }

  .btn-summarize { border-color: #4c1d95; color: var(--purple); }
  .btn-summarize:hover { background: #1c1028; }

  .outcome-status { font-size: 0.75rem; color: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>shuo <span>monitor</span></h1>
  <div id="ws-status" class="connecting">connecting…</div>
  <div id="active-count">active: 0</div>
</header>

<main>
  <!-- ── New Call form ─────────────────────────────────────────── -->
  <div id="new-call-panel">
    <div id="new-call-header" onclick="toggleNewCallForm()">
      <span>+ New Call</span>
      <span id="new-call-toggle">▲ collapse</span>
    </div>
    <div id="new-call-body">
      <div class="form-row">
        <label for="nc-phone">Phone</label>
        <input id="nc-phone" type="tel" placeholder="+61400000000" autocomplete="off">
      </div>
      <div class="form-row" style="align-items:flex-start">
        <label for="nc-goal" style="padding-top:6px">Goal</label>
        <textarea id="nc-goal" rows="2"
          placeholder="e.g. Confirm the customer's appointment for tomorrow at 2pm"></textarea>
      </div>
      <div id="call-form-actions">
        <button class="btn-call" id="btn-place-call" onclick="placeCall()">📞 Place Call</button>
        <span id="call-form-msg"></span>
      </div>
    </div>
  </div>

  <div id="no-calls">No active calls. Waiting…</div>
  <div id="calls"></div>
</main>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const calls = {};       // call_id → callState
let   ws    = null;
let   reconnectDelay = 1000;

// ── WebSocket ──────────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const url   = `${proto}://${location.host}/dashboard/ws`;

  setWsStatus('connecting', 'connecting…');
  ws = new WebSocket(url);

  ws.onopen = () => {
    setWsStatus('connected', 'connected');
    reconnectDelay = 1000;
  };

  ws.onmessage = e => {
    try { handleEvent(JSON.parse(e.data)); }
    catch (err) { console.error('parse error', err); }
  };

  ws.onclose = ws.onerror = () => {
    setWsStatus('disconnected', `reconnecting in ${reconnectDelay / 1000}s…`);
    setTimeout(() => {
      reconnectDelay = Math.min(reconnectDelay * 2, 16000);
      connectWS();
    }, reconnectDelay);
  };
}

function setWsStatus(cls, text) {
  const el = document.getElementById('ws-status');
  el.className = cls;
  el.textContent = text;
}

// ── Event dispatcher ───────────────────────────────────────────────────────
function handleEvent(ev) {
  switch (ev.type) {
    case 'active_calls': ev.calls.forEach(c => getOrCreatePanel(c)); break;
    case 'stream_start': getOrCreatePanel({
        call_id: ev.call_id, phone: ev.phone || ev.call_id,
        goal: ev.goal || '', mode: 'agent'
      }); break;
    case 'stream_stop':  scheduleRemove(ev.call_id); break;
    case 'transcript':   addUserTurn(ev.call_id, ev.text); break;
    case 'phase_change': setPhase(ev.call_id, ev.to); break;
    case 'agent_token':  appendAgentToken(ev.call_id, ev.token); break;
    case 'agent_done':   finalizeAgentTurn(ev.call_id); break;
    case 'dtmf':         addEventChip(ev.call_id, `📱 ${ev.digit}`, 'dtmf'); break;
    case 'hold':         addEventChip(ev.call_id, '⏸ hold', 'hold'); break;
    case 'hold_end':     addEventChip(ev.call_id, '▶ hold end', 'hold'); break;
    case 'takeover':     setMode(ev.call_id, 'takeover'); break;
    case 'handback':     setMode(ev.call_id, 'agent'); break;
  }
}

// ── Panel lifecycle ────────────────────────────────────────────────────────
function getOrCreatePanel(callData) {
  if (calls[callData.call_id]) return calls[callData.call_id];

  const state = {
    call_id:        callData.call_id,
    phone:          callData.phone  || callData.call_id,
    goal:           callData.goal   || '',
    mode:           callData.mode   || 'agent',
    phase:          'LISTENING',
    elapsed:        callData.elapsed || 0,
    timerInterval:  null,
    agentBlock:     null,   // current streaming agent turn div
    agentBuf:       '',     // buffer accumulating current agent turn text
    transcript:     [],     // [{role, text}] for summary
  };
  calls[callData.call_id] = state;

  const panel = buildPanel(state);
  state.panel = panel;
  document.getElementById('calls').appendChild(panel);
  document.getElementById('no-calls').style.display = 'none';
  updateActiveCount();

  // Elapsed timer
  state.timerInterval = setInterval(() => {
    state.elapsed++;
    const el = panel.querySelector('.call-timer');
    if (el) el.textContent = formatTime(state.elapsed);
  }, 1000);

  return state;
}

function scheduleRemove(callId) {
  const state = calls[callId];
  if (!state) return;
  // Show the outcome panel and stop the timer; panel stays until dismissed
  clearInterval(state.timerInterval);
  const panel = state.panel;
  panel.querySelector('.outcome-panel').classList.add('visible');
  panel.querySelector('.call-header').style.opacity = '0.5';
  // Disable control buttons
  panel.querySelectorAll('.controls button').forEach(b => b.disabled = true);
}

function removePanel(callId) {
  const state = calls[callId];
  if (!state) return;
  clearInterval(state.timerInterval);
  if (state.panel) state.panel.remove();
  delete calls[callId];
  if (Object.keys(calls).length === 0)
    document.getElementById('no-calls').style.display = '';
  updateActiveCount();
}

function updateActiveCount() {
  document.getElementById('active-count').textContent =
    `active: ${Object.keys(calls).length}`;
}

// ── Build DOM ──────────────────────────────────────────────────────────────
function buildPanel(state) {
  const el = document.createElement('div');
  el.className = 'call-panel';
  el.dataset.callId = state.call_id;

  el.innerHTML = `
    <div class="call-header">
      <span class="call-phone">${esc(state.phone || state.call_id)}</span>
      <span class="call-id">${esc(state.call_id)}</span>
      <span class="phase-badge LISTENING">LISTENING</span>
      <span class="call-timer">${formatTime(state.elapsed)}</span>
    </div>
    <div class="call-goal">
      <strong>Goal:</strong> <span class="goal-text">${esc(state.goal) || '<span style="color:var(--muted)">—</span>'}</span>
    </div>
    <div class="transcript-grid">
      <div class="col user-col">
        <div class="col-label">USER</div>
        <div class="col-content user-content"></div>
      </div>
      <div class="col agent-col">
        <div class="col-label">AGENT</div>
        <div class="col-content agent-content"></div>
      </div>
    </div>
    <div class="call-events"></div>
    <div class="takeover-banner">
      ⚠ Agent suppressed — human in control.
      <a href="/phone" target="_blank">Open softphone ↗</a>
      to speak with the caller.
    </div>
    <div class="controls">
      <button class="btn-hangup"   onclick="doHangup('${state.call_id}')">🔴 Hang Up</button>
      <button class="btn-takeover" onclick="doTakeover('${state.call_id}')">🎤 Take Over</button>
      <button class="btn-handback" onclick="doHandback('${state.call_id}')" style="display:none">🔙 Hand Back</button>
      <button class="btn-keypad-toggle" onclick="toggleKeypad('${state.call_id}')">📱 Keypad</button>
    </div>
    <div class="keypad">
      <div class="keypad-grid">
        ${['1','2','3','4','5','6','7','8','9','*','0','#'].map(d =>
          `<button onclick="doSendDTMF('${state.call_id}','${d}')">${d}</button>`
        ).join('')}
      </div>
    </div>
    <div class="outcome-panel">
      <div class="outcome-label">OUTCOME</div>
      <div class="outcome-text">—</div>
      <div class="outcome-actions">
        <button class="btn-summarize" onclick="doSummarize('${state.call_id}')">✨ Summarize</button>
        <span class="outcome-status"></span>
      </div>
    </div>
  `;
  return el;
}

// ── Goal update ────────────────────────────────────────────────────────────
function updateGoal(callId, goal) {
  const state = calls[callId];
  if (!state) return;
  state.goal = goal;
  const el = state.panel.querySelector('.goal-text');
  if (el) el.innerHTML = goal ? esc(goal) : '<span style="color:var(--muted)">—</span>';
}

// ── Transcript ────────────────────────────────────────────────────────────
function addUserTurn(callId, text) {
  const state = calls[callId];
  if (!state) return;
  state.transcript.push({ role: 'user', text });
  const content = state.panel.querySelector('.user-content');
  const block = document.createElement('div');
  block.className = 'turn-block';
  block.textContent = `"${text}"`;
  content.appendChild(block);
  content.scrollTop = content.scrollHeight;
}

function appendAgentToken(callId, token) {
  const state = calls[callId];
  if (!state) return;
  state.agentBuf += token;
  const content = state.panel.querySelector('.agent-content');

  if (!state.agentBlock) {
    state.agentBlock = document.createElement('div');
    state.agentBlock.className = 'turn-block streaming';
    content.appendChild(state.agentBlock);
  }
  state.agentBlock.appendChild(document.createTextNode(token));
  content.scrollTop = content.scrollHeight;
}

function finalizeAgentTurn(callId) {
  const state = calls[callId];
  if (!state || !state.agentBlock) return;
  state.agentBlock.classList.remove('streaming');
  state.agentBlock = null;
  if (state.agentBuf) {
    state.transcript.push({ role: 'agent', text: state.agentBuf });
    state.agentBuf = '';
  }
}

// ── Phase / mode ──────────────────────────────────────────────────────────
function setPhase(callId, phase) {
  const state = calls[callId];
  if (!state) return;
  state.phase = phase;

  // Start a fresh agent block on new RESPONDING phase
  if (phase === 'RESPONDING') state.agentBlock = null;

  const badge = state.panel.querySelector('.phase-badge');
  if (!badge) return;

  const displayPhase = state.mode === 'takeover' ? 'TAKEOVER' : phase;
  badge.className = `phase-badge ${displayPhase}`;
  badge.textContent = displayPhase;
}

function setMode(callId, mode) {
  const state = calls[callId];
  if (!state) return;
  state.mode = mode;

  const banner   = state.panel.querySelector('.takeover-banner');
  const btnTake  = state.panel.querySelector('.btn-takeover');
  const btnBack  = state.panel.querySelector('.btn-handback');

  if (mode === 'takeover') {
    banner.classList.add('visible');
    btnTake.style.display = 'none';
    btnBack.style.display = '';
  } else {
    banner.classList.remove('visible');
    btnTake.style.display = '';
    btnBack.style.display = 'none';
  }

  setPhase(callId, state.phase); // refresh badge
}

// ── Event chips ───────────────────────────────────────────────────────────
function addEventChip(callId, label, cls) {
  const state = calls[callId];
  if (!state) return;
  const container = state.panel.querySelector('.call-events');
  const chip = document.createElement('span');
  chip.className = `event-chip ${cls}`;
  chip.textContent = label;
  container.appendChild(chip);
}

// ── Control actions ───────────────────────────────────────────────────────
async function doHangup(callId) {
  if (!confirm('Hang up this call?')) return;
  try {
    const r = await api(`/dashboard/calls/${callId}/hangup`, 'POST');
    if (!r.ok) showError(callId, await r.text());
  } catch (e) { showError(callId, e.message); }
}

async function doTakeover(callId) {
  try {
    const r = await api(`/dashboard/calls/${callId}/takeover`, 'POST');
    if (!r.ok) showError(callId, await r.text());
  } catch (e) { showError(callId, e.message); }
}

async function doHandback(callId) {
  try {
    const r = await api(`/dashboard/calls/${callId}/handback`, 'POST');
    if (!r.ok) showError(callId, await r.text());
  } catch (e) { showError(callId, e.message); }
}

async function doSendDTMF(callId, digit) {
  try {
    const r = await api(`/dashboard/calls/${callId}/dtmf`, 'POST', { digit });
    if (!r.ok) showError(callId, await r.text());
  } catch (e) { showError(callId, e.message); }
}

function toggleKeypad(callId) {
  const state = calls[callId];
  if (!state) return;
  const keypad = state.panel.querySelector('.keypad');
  keypad.classList.toggle('open');
}

// ── Helpers ────────────────────────────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  return fetch(path, opts);
}

function showError(callId, msg) {
  const state = calls[callId];
  if (!state) return;
  addEventChip(callId, `⚠ ${msg}`, '');
}

function formatTime(secs) {
  const m = String(Math.floor(secs / 60)).padStart(2, '0');
  const s = String(secs % 60).padStart(2, '0');
  return `${m}:${s}`;
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Outcome / Summary ──────────────────────────────────────────────────────
async function doSummarize(callId) {
  const state = calls[callId];
  if (!state) return;
  const panel   = state.panel;
  const textEl  = panel.querySelector('.outcome-text');
  const statusEl = panel.querySelector('.outcome-status');
  const btn     = panel.querySelector('.btn-summarize');

  btn.disabled = true;
  statusEl.textContent = 'Generating…';

  try {
    const r = await api('/dashboard/summarize', 'POST', {
      goal:       state.goal,
      transcript: state.transcript,
    });
    const data = await r.json();
    if (!r.ok) {
      statusEl.textContent = `Error: ${data.error || r.statusText}`;
      btn.disabled = false;
    } else {
      textEl.textContent = data.summary;
      statusEl.textContent = '';
    }
  } catch (e) {
    statusEl.textContent = `Error: ${e.message}`;
    btn.disabled = false;
  }
}

// ── New Call form ───────────────────────────────────────────────────────────
function toggleNewCallForm() {
  const body   = document.getElementById('new-call-body');
  const toggle = document.getElementById('new-call-toggle');
  const collapsed = body.classList.toggle('hidden');
  toggle.textContent = collapsed ? '▼ expand' : '▲ collapse';
}

async function placeCall() {
  const phone = document.getElementById('nc-phone').value.trim();
  const goal  = document.getElementById('nc-goal').value.trim();
  const btn   = document.getElementById('btn-place-call');
  const msg   = document.getElementById('call-form-msg');

  if (!phone) {
    setFormMsg('Phone number is required', 'error');
    return;
  }

  btn.disabled = true;
  setFormMsg('Placing call…', '');

  try {
    const r = await api('/dashboard/call', 'POST', { phone, goal });
    const data = await r.json();
    if (!r.ok) {
      setFormMsg(`Error: ${data.error || r.statusText}`, 'error');
    } else {
      setFormMsg(`Calling ${data.to}…`, 'ok');
    }
  } catch (e) {
    setFormMsg(`Error: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
  }
}

function setFormMsg(text, cls) {
  const el = document.getElementById('call-form-msg');
  el.textContent = text;
  el.className   = cls;
}

// Allow pressing Enter in the phone field to submit
document.getElementById('nc-phone').addEventListener('keydown', e => {
  if (e.key === 'Enter') placeCall();
});

// ── Boot ────────────────────────────────────────────────────────────────────
connectWS();
</script>
